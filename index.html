<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الخزنة السرية | Cinematic Edition 🎬</title>
    <style>
        :root {
            --primary: #ff1f5a;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: sans-serif; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(-45deg, #1a050d, #3d0b1a, #5c1126, #1a050d);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG { 0% {background-position:0% 50%} 50% {background-position:100% 50%} 100% {background-position:0% 50%} }

        /* --- تأثير الشعاع الأبيض الموعوج --- */
        .light-beam {
            position: fixed; top: 0; left: -100%; width: 200%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            transform: skewX(-45deg) scaleY(0.5); z-index: 100; pointer-events: none; display: none;
        }
        @keyframes beamMove {
            0% { left: -150%; opacity: 0; transform: skewX(-45deg) translateY(-20%); }
            50% { opacity: 1; transform: skewX(-45deg) translateY(20%); }
            100% { left: 150%; opacity: 0; transform: skewX(-45deg) translateY(-20%); }
        }

        /* --- تأثير قلب الحب الأبيض المركزي --- */
        .central-heart-overlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 200px; height: 200px; z-index: 101; pointer-events: none; display: none;
        }
        .draw-heart-path {
            fill: none; stroke: #fff; stroke-width: 2;
            stroke-dasharray: 1000; stroke-dashoffset: 1000;
            filter: drop-shadow(0 0 20px #fff);
        }
        @keyframes drawFadeHeart {
            0% { stroke-dashoffset: 1000; opacity: 0; transform: scale(0.8); }
            50% { stroke-dashoffset: 0; opacity: 1; transform: scale(1.1); }
            100% { stroke-dashoffset: 0; opacity: 0; transform: scale(1.5); }
        }

        /* حاوية التصميم */
        .container { z-index: 10; text-align: center; }
        
        #lock-screen { animation: fadeIn 1s; }
        .heart-btn-container { cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        .heart-btn-container:hover { transform: scale(1.1); }
        .heart-svg { width: 140px; filter: drop-shadow(0 0 15px var(--primary)); }
        
        #password-box {
            display: none; background: var(--glass); backdrop-filter: blur(25px);
            padding: 35px; border-radius: 25px; border: 1px solid var(--border);
            width: 280px; animation: slideUp 0.6s ease;
        }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        input { background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 12px; border-radius: 12px; width: 90%; color: #fff; text-align: center; font-size: 20px; margin-bottom: 15px; outline: none; }
        button { background: linear-gradient(135deg, var(--primary), #8e1032); color: #fff; border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { transform: translateY(-3px); box-shadow: 0 5px 15px var(--primary); }

        /* شاشة المحتوى */
        #secret-content { display: none; text-align: center; color: white; opacity: 0; }
        .user-img { width: 220px; height: 220px; border-radius: 50%; border: 4px solid #fff; object-fit: cover; box-shadow: 0 0 30px var(--primary); animation: float 4s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .message-card { background: var(--glass); padding: 20px; border-radius: 20px; border: 1px solid var(--border); margin-top: 20px; }

        @keyframes fadeInContent { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="lightBeam" class="light-beam"></div>
    <div id="centralHeart" class="central-heart-overlay">
        <svg viewBox="0 0 32 32">
            <path class="draw-heart-path" d="M16 28.5L14.1 26.7C7.2 20.4 2.5 16.2 2.5 11C2.5 6.6 6 3.1 10.4 3.1C12.9 3.1 15.3 4.2 16.9 6.1C18.5 4.2 20.9 3.1 23.4 3.1C27.8 3.1 31.3 6.6 31.3 11C31.3 16.2 26.6 20.4 19.7 26.7L16 28.5Z"/>
        </svg>
    </div>

    <div class="container">
        <div id="lock-screen">
            <div class="heart-btn-container" onclick="showInput()">
                <svg class="heart-svg" viewBox="0 0 32 32">
                    <path fill="#ff1f5a" d="M16 28.5L14.1 26.7C7.2 20.4 2.5 16.2 2.5 11C2.5 6.6 6 3.1 10.4 3.1C12.9 3.1 15.3 4.2 16.9 6.1C18.5 4.2 20.9 3.1 23.4 3.1C27.8 3.1 31.3 6.6 31.3 11C31.3 16.2 26.6 20.4 19.7 26.7L16 28.5Z"/>
                </svg>
            </div>
            <div id="password-box">
                <h2 style="color: #fff; margin-bottom: 20px;">الخزنة السرية</h2>
                <input type="text" id="passInput" placeholder="أدخل الرمز">
                <button onclick="check()">فتح ✨</button>
            </div>
        </div>

        <div id="secret-content">
            <img id="sharedImg" src="" class="user-img">
            <div class="message-card">
                <p id="msg" style="font-size: 24px; font-weight: bold; margin: 0;"></p>
            </div>
        </div>
    </div>

    <script>
        const staticPass = "1X";
        const sheetID = "11vyohqnDbQf7CT3SQ_jVKoIkbjaHw_AY53buW4quQr4";
        const exportUrl = `https://docs.google.com/spreadsheets/d/${sheetID}/export?format=csv&gid=0`;

        let dataImg = "", dataMsg = "";

        async function fetchSheet() {
            try {
                const r = await fetch(exportUrl);
                const t = await r.text();
                const rows = t.split('\n');
                if (rows.length > 1) {
                    const cols = rows[1].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    dataImg = cols[1].replace(/"/g, "").trim();
                    dataMsg = cols[2].replace(/"/g, "").trim();
                }
            } catch (e) { console.error("Error"); }
        }
        fetchSheet();

        function showInput() {
            document.querySelector('.heart-btn-container').style.display='none';
            document.getElementById('password-box').style.display='block';
        }

        function check() {
            if(document.getElementById('passInput').value.trim() === staticPass) {
                runCinematicSequence();
            } else { alert("الرمز خطأ ❤️"); }
        }

        function runCinematicSequence() {
            // 1. إخفاء شاشة القفل
            document.getElementById('lock-screen').style.display = 'none';

            // 2. تفعيل الشعاع الأبيض الموعوج
            const beam = document.getElementById('lightBeam');
            beam.style.display = 'block';
            beam.style.animation = 'beamMove 1.2s ease-in-out forwards';

            // 3. تفعيل رسم القلب الأبيض في المنتصف بعد الشعاع
            setTimeout(() => {
                const centralHeart = document.getElementById('centralHeart');
                centralHeart.style.display = 'block';
                centralHeart.querySelector('path').style.animation = 'drawFadeHeart 1.5s ease-out forwards';
                
                // 4. إظهار المحتوى النهائي بعد اختفاء القلب
                setTimeout(() => {
                    document.getElementById('secret-content').style.display = 'block';
                    document.getElementById('secret-content').style.animation = 'fadeInContent 1s forwards';
                    document.getElementById('sharedImg').src = dataImg;
                    typeWriter();
                }, 1400);

            }, 800);
        }

        function typeWriter() {
            let i = 0;
            function type() {
                if(i < dataMsg.length) {
                    document.getElementById('msg').innerHTML += dataMsg.charAt(i);
                    i++; setTimeout(type, 80);
                }
            }
            type();
        }
    </script>
</body>
</html>
