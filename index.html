<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محول HTML إلى Dyalib</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: #2a2a35;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #4caf50;
            margin-bottom: 10px;
        }
        p.description {
            text-align: center;
            color: #aaa;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #e0e0e0;
        }
        input[type="text"], textarea {
            width: 100%;
            background: #111116;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            padding: 12px;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }
        textarea {
            height: 250px;
            resize: vertical;
        }
        textarea:focus, input[type="text"]:focus {
            border-color: #4caf50;
            outline: none;
        }
        button {
            width: 100%;
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #45a049;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>محول الأفكار إلى Dyalib 🚀</h1>
    <p class="description">ضع كود الـ HTML الخاص بك في الأسفل لتعبئته وتحويله إلى ملف مكتبة ديناميكية.</p>
    
    <div class="input-group">
        <label for="fileName">اسم الملف (بدون صيغة):</label>
        <input type="text" id="fileName" placeholder="مثلاً: my_awesome_project" value="script_library">
    </div>

    <div class="input-group">
        <label for="htmlCode">كود الـ HTML أو الفكرة البرمجية:</label>
        <textarea id="htmlCode" placeholder="إكتب أو الصق كود الـ HTML هنا..."></textarea>
    </div>

    <button onclick="convertToDyalib()">تحويل وتحميل الملف بصيغة .dyalib</button>
    
    <div class="footer">
        تم التطوير ليعمل مباشرة من خلال المتصفح
    </div>
</div>

<script>
    function convertToDyalib() {
        const htmlContent = document.getElementById('htmlCode').value;
        let fileName = document.getElementById('fileName').value.trim();

        if (!htmlContent) {
            alert('الرجاء كتابة أو لصق كود HTML أولاً!');
            return;
        }

        if (!fileName) {
            fileName = 'library';
        }

        // تحويل الكود إلى صيغة نصية آمنة أو تغليفه كـ String بداخل هيكلية ملف المكتبة
        // هنا نقوم بصناعة هيكل الملف النصي الذي سيحمل امتداد .dyalib
        const dyalibStructure = `/* Generated by HTML to Dyalib Converter */\n\nconst injectedHTML = \`${htmlContent.replace(/`/g, '\\`').replace(/\${/g, '\\${')}\`;\n\nexport default injectedHTML;`;

        // إنشاء الـ Blob لتنزيل الملف من المتصفح
        const blob = new Blob([dyalibStructure], { type: 'application/octet-stream' });
        const url = URL.createObjectURL(blob);
        
        // إنشاء عنصر رابط وهمي للتحميل
        const downloadLink = document.createElement('a');
        downloadLink.href = url;
        downloadLink.download = `${fileName}.dyalib`;
        
        // تفعيل التحميل وحذف الرابط
        document.body.appendChild(downloadLink);
        downloadLink.click();
        document.body.removeChild(downloadLink);
        
        // تحرير الذاكرة
        URL.revokeObjectURL(url);
    }
</script>

</body>
</html>
