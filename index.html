<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Hassany Store Mini App</title>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #f0f0f5);
            --text-color: var(--tg-theme-text-color, #000000);
            --hint-color: var(--tg-theme-hint-color, #8e8e93);
            --button-color: var(--tg-theme-button-color, #007aff);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #ffffff);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            user-select: none;
            overflow-x: hidden;
        }

        /* Header iOS Style */
        header {
            padding: 20px;
            text-align: center;
            background: var(--secondary-bg);
            border-bottom: 1px solid rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        header h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        header p {
            margin: 5px 0 0;
            color: var(--hint-color);
            font-size: 14px;
        }

        /* Container */
        .container {
            padding: 15px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin: 20px 5px 10px;
            color: var(--text-color);
        }

        /* Grid System */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* Card iOS Style */
        .card {
            background: var(--secondary-bg);
            border-radius: 18px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s active;
        }

        .card:active {
            transform: scale(0.96);
        }

        .card img {
            width: 50px;
            height: 50px;
            margin-bottom: 10px;
            border-radius: 12px;
        }

        .card h3 {
            margin: 5px 0;
            font-size: 15px;
            font-weight: 600;
        }

        .card span {
            display: block;
            color: var(--button-color);
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .btn {
            background-color: var(--button-color);
            color: var(--button-text);
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
        }

        /* Bottom Info */
        footer {
            padding: 30px 20px;
            text-align: center;
            font-size: 12px;
            color: var(--hint-color);
        }

        .user-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .user-info img {
            width: 30px;
            height: 30px;
            border-radius: 50%;
        }
    </style>
</head>
<body>

<header>
    <h1>متجر الحسني 💎</h1>
    <p>Hassany Store - عالم التعديل</p>
</header>

<div class="container">
    <div id="user-chip" class="user-info"></div>

    <div class="section-title">خدمات iOS وتطبيقات 📱</div>
    <div class="grid">
        <div class="card" onclick="buyService('اشتراك تطبيقات IPA')">
            <img src="https://cdn-icons-png.flaticon.com/512/831/831329.png" alt="IPA">
            <h3>اشتراك IPA</h3>
            <span>5,000 د.ع</span>
            <button class="btn">طلب الآن</button>
        </div>
        <div class="card" onclick="buyService('شهادة ابل سنوية')">
            <img src="https://cdn-icons-png.flaticon.com/512/732/732190.png" alt="Cert">
            <h3>شهادة ابل</h3>
            <span>15,000 د.ع</span>
            <button class="btn">طلب الآن</button>
        </div>
    </div>

    <div class="section-title">شحن ألعاب 🎮</div>
    <div class="grid">
        <div class="card" onclick="buyService('شحن شدات ببجي')">
            <img src="https://cdn-icons-png.flaticon.com/512/3211/3211181.png" alt="PUBG">
            <h3>شدات ببجي</h3>
            <span>حسب الكمية</span>
            <button class="btn">شحن</button>
        </div>
        <div class="card" onclick="buyService('شحن كلاش رويال')">
            <img src="https://cdn-icons-png.flaticon.com/512/1012/1012702.png" alt="Clash">
            <h3>كلاش رويال</h3>
            <span>عروض خاصة</span>
            <button class="btn">شحن</button>
        </div>
    </div>
</div>

<footer>
    تم التطوير بواسطة Hassany | 2024<br>
    جميع الحقوق محفوظة @hassanyIPA
</footer>

<script>
    // تهيئة تطبيق تليجرام
    const tg = window.Telegram.WebApp;
    tg.expand(); // جعل التطبيق يملأ الشاشة

    // إظهار اسم المستخدم
    const userChip = document.getElementById('user-chip');
    if (tg.initDataUnsafe.user) {
        userChip.innerHTML = `
            <span>أهلاً بك، <b>${tg.initDataUnsafe.user.first_name}</b></span>
        `;
    }

    // وظيفة الطلب
    function buyService(serviceName) {
        tg.showConfirm(`هل تريد طلب خدمة: ${serviceName}؟`, (confirmed) => {
            if (confirmed) {
                // إرسال البيانات للبوت
                tg.sendData(JSON.stringify({
                    service: serviceName,
                    user: tg.initDataUnsafe.user.username || "بدون يوزر"
                }));
                tg.close(); // إغلاق التطبيق بعد الطلب
            }
        });
    }

    // ضبط ألوان الثيم
    tg.onEvent('themeChanged', function() {
        document.documentElement.style.setProperty('--bg-color', tg.themeParams.bg_color);
        document.documentElement.style.setProperty('--text-color', tg.themeParams.text_color);
    });
</script>

</body>
</html>
