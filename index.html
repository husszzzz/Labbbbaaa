<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUB HUSSAIN | DIGITAL EDITION</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Readex+Pro:wght@300;500;700&display=swap');

        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #3d8bff; /* أزرق حديث */
            --bg: #030303;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(61, 139, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(61, 139, 255, 0.05) 0%, transparent 40%);
            color: #efefef;
            font-family: 'Readex Pro', sans-serif;
            margin: 0;
            padding-bottom: 100px;
            min-height: 100vh;
        }

        /* هيدر بسيط جداً (Minimal) */
        header {
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .logo { font-size: 1.5rem; font-weight: 700; letter-spacing: -1px; color: #fff; }
        .logo span { color: var(--accent); }
        .live-status { font-size: 0.7rem; color: #888; display: flex; align-items: center; gap: 6px; }
        .dot { width: 6px; height: 6px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 10px #00ff88; }

        .container { max-width: 500px; margin: 0 auto; padding: 0 20px; }
        .hidden { display: none !important; }

        /* الأقسام الزجاجية */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .section-label { 
            font-size: 0.8rem; font-weight: 500; color: var(--accent); 
            margin-bottom: 15px; display: block; text-transform: uppercase; letter-spacing: 1px;
        }

        /* الجداول الأنيقة */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: right; font-size: 0.75rem; color: #666; padding-bottom: 10px; }
        td { padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.95rem; }
        .rank-num { width: 30px; font-weight: 700; color: #444; }
        .team-name { font-weight: 500; color: #fff; }
        .pts { font-weight: 700; color: var(--accent); text-align: left; }

        /* القوائم البسيطة */
        .flex-list { display: flex; flex-direction: column; gap: 12px; }
        .list-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .list-row:last-child { border: none; }
        .val-badge { background: rgba(255,255,255,0.05); padding: 4px 12px; border-radius: 12px; font-size: 0.8rem; font-weight: 700; }

        /* البطاقات الشخصية (اللاعبين) */
        .grid-db { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .player-chip {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            padding: 20px; border-radius: 20px; text-align: center;
            transition: 0.3s;
        }
        .player-chip:hover { background: var(--glass); border-color: var(--accent); transform: translateY(-5px); }
        .player-chip i { font-size: 1.5rem; margin-bottom: 10px; display: block; color: #555; }
        .player-chip span { font-size: 0.85rem; font-weight: 500; }

        /* القائمة السفلية (Modern Tab Bar) */
        .tab-bar {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; height: 65px;
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 35px;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 9999; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .tab-item { color: #666; font-size: 1.2rem; cursor: pointer; transition: 0.3s; position: relative; }
        .tab-item.active { color: var(--accent); }
        .tab-item.active::after {
            content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
            width: 4px; height: 4px; background: var(--accent); border-radius: 50%;
        }

        /* نافذة المودال */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 10000; align-items: center; justify-content: center; padding: 20px; }
        .modal-body { background: #111; padding: 30px; border-radius: 30px; border: 1px solid var(--glass-border); width: 100%; max-width: 350px; text-align: center; }

        /* شريط الأخبار العلوي الصغير */
        .mini-news { width: 100%; overflow: hidden; background: var(--accent); color: #000; font-size: 0.7rem; font-weight: 700; padding: 4px 0; }
        .news-slide { display: inline-block; white-space: nowrap; animation: slide 15s linear infinite; }
        @keyframes slide { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

    </style>
</head>
<body>

<div class="mini-news">
    <div class="news-slide" id="news-ticker">... جاري تحميل آخر التحديثات والأخبار</div>
</div>

<header>
    <div class="logo">HUB<span>HUSSAIN</span></div>
    <div class="live-status"><div class="dot"></div> نظام المزامنة الذكي متصل</div>
</header>

<div id="p-home" class="container">
    <span class="section-label">الترتيب العام</span>
    <div class="glass-card">
        <table id="league-table"></table>
    </div>

    <span class="section-label">التصنيف العالمي</span>
    <div class="glass-card" id="world-rank"></div>
</div>

<div id="p-matches" class="container hidden">
    <span class="section-label">المواجهات القادمة</span>
    <div id="matches-list"></div>
</div>

<div id="p-awards" class="container hidden">
    <span class="section-label">نجم الأسبوع</span>
    <div id="motm-hero"></div>

    <span class="section-label">قائمة الهدافين</span>
    <div class="glass-card" id="scorers-list"></div>
</div>

<div id="p-db" class="container hidden">
    <span class="section-label">الأعضاء واللاعبين</span>
    <div class="grid-db" id="players-grid"></div>
</div>

<div class="tab-bar">
    <div class="tab-item active" onclick="nav('home', this)"><i class="fas fa-home-alt"></i></div>
    <div class="tab-item" onclick="nav('matches', this)"><i class="fas fa-calendar-star"></i></div>
    <div class="tab-item" onclick="nav('awards', this)"><i class="fas fa-shuttle-space"></i></div>
    <div class="tab-item" onclick="nav('db', this)"><i class="fas fa-users-viewfinder"></i></div>
</div>

<div class="modal" id="modal">
    <div class="modal-body">
        <h3 id="m-title" style="margin-bottom:10px;"></h3>
        <p id="m-desc" style="color:#888; font-size: 0.9rem; line-height: 1.6;"></p>
        <button onclick="document.getElementById('modal').style.display='none'" style="margin-top:20px; background:none; border: 1px solid #333; color:#fff; padding: 10px 25px; border-radius: 20px; cursor:pointer;">إغلاق</button>
    </div>
</div>

<script>
    function nav(p, el) {
        document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
        document.getElementById('p-' + p).classList.remove('hidden');
        document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        window.scrollTo(0,0);
    }

    const sheetURL = "https://docs.google.com/spreadsheets/d/1-MToSjxxd5GTvmghx0MxkZJmU0gXOZbDPCt8-Q45Db8/export?format=csv";

    async function sync() {
        try {
            const res = await fetch(sheetURL);
            const data = await res.text();
            const rows = data.split('\n').map(r => r.split(',').map(c => c.replace(/"/g, '').trim()));

            // أخبار
            document.getElementById('news-ticker').innerText = rows[1][21] || "لا توجد تحديثات جديدة";

            // الترتيب
            let teams = rows.slice(1).map(r => ({ n: r[0], s: parseInt(r[5]) || 0 })).filter(x => x.n && x.n !== "الفريق").sort((a,b) => b.s - a.s);
            let tableH = "";
            teams.forEach((t, i) => {
                tableH += `<tr><td class="rank-num">${i+1}</td><td class="team-name">${t.n}</td><td class="pts">${t.s} PT</td></tr>`;
            });
            document.getElementById('league-table').innerHTML = tableH;

            // تصنيف عالمي
            let wrH = "";
            for(let i=1; i<=5; i++) {
                if(rows[i][8]) wrH += `<div class="list-row"><span>${rows[i][8]}</span><span class="val-badge">${rows[i][9]}</span></div>`;
            }
            document.getElementById('world-rank').innerHTML = wrH;

            // الهدافين
            let scH = "";
            for(let i=1; i<=5; i++) {
                if(rows[i][13]) scH += `<div class="list-row"><span>${rows[i][13]}</span><span style="color:var(--accent); font-weight:700;">${rows[i][14]}</span></div>`;
            }
            document.getElementById('scorers-list').innerHTML = scH;

            // رجل الجولة
            if(rows[1][16]) {
                document.getElementById('motm-hero').innerHTML = `
                <div class="glass-card" style="text-align:center;">
                    <img src="${rows[0][15]}" style="width:80px; height:80px; border-radius:50%; object-fit:cover; border: 2px solid var(--accent); padding:3px; margin-bottom:10px;">
                    <h2 style="margin:0; font-size:1.2rem;">${rows[1][16]}</h2>
                    <p style="color:#666; font-size:0.7rem;">PLAYER OF THE WEEK</p>
                </div>`;
            }

            // قاعدة البيانات
            let dbH = "";
            for(let i=1; i<=12; i++) {
                if(rows[i][24]) dbH += `<div class="player-chip" onclick="show('${rows[i][24]}', '${rows[i][25]}')"><i class="fa-regular fa-circle-user"></i><span>${rows[i][24]}</span></div>`;
            }
            document.getElementById('players-grid').innerHTML = dbH;

            // المباريات
            let mxH = "";
            for(let i=1; i<=3; i++) {
                if(rows[i][17]) {
                    mxH += `<div class="glass-card">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span style="font-weight:700;">${rows[i][17]}</span>
                            <span style="color:var(--accent); font-size:0.8rem;">VS</span>
                            <span style="font-weight:700;">${rows[i][18]}</span>
                        </div>
                        <div style="margin-top:15px; font-size:0.7rem; color:#555; display:flex; justify-content:space-between;">
                            <span><i class="fa-regular fa-clock"></i> ${rows[i][20]}</span>
                            <span><i class="fa-solid fa-location-dot"></i> ${rows[i][19]}</span>
                        </div>
                    </div>`;
                }
            }
            document.getElementById('matches-list').innerHTML = mxH;

        } catch(e) { console.log(e); }
    }

    function show(t, d) {
        document.getElementById('m-title').innerText = t;
        document.getElementById('m-desc').innerText = d;
        document.getElementById('modal').style.display = 'flex';
    }

    sync();
    setInterval(sync, 30000);
</script>
</body>
</html>
