<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>متجر الحسني</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; padding: 20px; }
        .app-card { background: white; padding: 15px; margin: 10px 0; border-radius: 10px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .app-card img { width: 60px; height: 60px; border-radius: 12px; margin-left: 15px; }
        .btn { background: #007bff; color: white; padding: 10px 20px; text-decoration: none; border-radius: 20px; }
    </style>
</head>
<body>

    <h1 style="text-align: center;">متجر الحسني</h1>
    <div id="store">جاري تحميل التطبيقات...</div>

    <script>
        // رابط جدولك بصيغة CSV
        const sheetUrl = "https://docs.google.com/spreadsheets/d/126ilAR3dYvW4NLzrorvfKTopvanRXfWufBTiqdnFn4s/gviz/tq?tqx=out:csv";

        fetch(sheetUrl)
            .then(res => res.text())
            .then(data => {
                const rows = data.split('\n').slice(1);
                const container = document.getElementById('store');
                container.innerHTML = '';
                
                rows.forEach(row => {
                    const cols = row.split('","').map(c => c.replace(/"/g, ''));
                    if (cols.length >= 4) {
                        container.innerHTML += `
                            <div class="app-card">
                                <img src="${cols[1]}" alt="icon">
                                <div>
                                    <h3>${cols[0]}</h3>
                                    <p>${cols[2]}</p>
                                </div>
                                <div style="flex-grow: 1;"></div>
                                <a href="${cols[3]}" class="btn">تثبيت</a>
                            </div>`;
                    }
                });
            });
    </script>
</body>
</html>
