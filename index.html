<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الخزنة السرية ❤️</title>
    <style>
        :root { --primary: #ff4d6d; --glass: rgba(255, 255, 255, 0.2); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #ffb3c1, #ff4d6d); }
        
        #lock-screen { text-align: center; z-index: 10; }
        .heart-svg { width: 130px; cursor: pointer; filter: drop-shadow(0 0 10px white); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        
        #password-box { display: none; background: var(--glass); backdrop-filter: blur(15px); padding: 30px; border-radius: 25px; border: 1px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 280px; }
        input { padding: 12px; border-radius: 12px; border: none; width: 90%; text-align: center; font-size: 20px; margin-bottom: 15px; outline: none; color: #c9184a; font-weight: bold; }
        button { background: #c9184a; color: white; border: none; padding: 12px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background: #ff4d6d; }

        #secret-content { display: none; text-align: center; color: white; animation: zoomIn 1s cubic-bezier(0.17, 0.89, 0.32, 1.49); }
        .user-img { width: 220px; height: 220px; border-radius: 50%; border: 6px solid white; object-fit: cover; margin-bottom: 25px; box-shadow: 0 0 30px rgba(255,255,255,0.5); animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        
        .message { font-size: 24px; font-weight: bold; background: rgba(0,0,0,0.15); padding: 20px; border-radius: 20px; max-width: 85%; margin: 0 auto; line-height: 1.5; }
        
        @keyframes zoomIn { from { transform: scale(0) rotate(-10deg); opacity: 0; } to { transform: scale(1) rotate(0); opacity: 1; } }
        .heart-particle { position: absolute; pointer-events: none; animation: fly 3.5s linear forwards; font-size: 20px; }
        @keyframes fly { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <div id="lock-screen">
        <svg class="heart-svg" viewBox="0 0 32 32" onclick="showInput()">
            <path fill="white" d="M16 28.5L14.1 26.7C7.2 20.4 2.5 16.2 2.5 11C2.5 6.6 6 3.1 10.4 3.1C12.9 3.1 15.3 4.2 16.9 6.1C18.5 4.2 20.9 3.1 23.4 3.1C27.8 3.1 31.3 6.6 31.3 11C31.3 16.2 26.6 20.4 19.7 26.7L16 28.5Z"/>
        </svg>
        <p style="color: white; font-weight: bold; margin-top: 15px; text-shadow: 0 2px 5px rgba(0,0,0,0.2);">اضغط على القلب ❤️</p>
        
        <div id="password-box">
            <input type="text" id="passInput" placeholder="أدخل الرمز السرّي">
            <button onclick="check()">فتح الخزنة ✨</button>
        </div>
    </div>

    <div id="secret-content">
        <img id="sharedImg" src="" class="user-img">
        <div id="msg" class="message"></div>
    </div>

    <script>
        // الرمز الثابت كما طلبت
        const staticPass = "1X";
        const sheetID = "11vyohqnDbQf7CT3SQ_jVKoIkbjaHw_AY53buW4quQr4";
        
        // رابط التصدير المباشر (لا يحتاج لنشر على الويب، فقط يحتاج أن يكون الجدول عاماً)
        const exportUrl = `https://docs.google.com/spreadsheets/d/${sheetID}/export?format=csv&gid=0`;

        let dataImg = "", dataMsg = "";

        // جلب البيانات فور تحميل الصفحة
        async function fetchSheet() {
            try {
                const response = await fetch(exportUrl);
                const text = await response.text();
                const rows = text.split('\n');
                
                if (rows.length > 1) {
                    // سحب البيانات من السطر الثاني وتوزيعها
                    const columns = rows[1].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    dataImg = columns[1].replace(/"/g, "").trim();
                    dataMsg = columns[2].replace(/"/g, "").trim();
                    console.log("البيانات جاهزة ✅");
                }
            } catch (error) {
                console.error("فشل في جلب البيانات من الجدول.");
            }
        }
        fetchSheet();

        function showInput() { 
            document.querySelector('.heart-svg').style.display='none';
            document.querySelector('p').style.display='none';
            document.getElementById('password-box').style.display='block'; 
        }

        function check() {
            const val = document.getElementById('passInput').value.trim();
            if(val === staticPass) {
                unlock();
            } else {
                alert("الرمز خطأ! حاول مجدداً ❤️");
                document.getElementById('passInput').value = "";
            }
        }

        function unlock() {
            document.getElementById('lock-screen').style.display='none';
            document.getElementById('secret-content').style.display='block';
            
            // وضع الصورة والرسالة من الجدول
            document.getElementById('sharedImg').src = dataImg;
            
            let i = 0;
            const targetMsg = dataMsg || "لا توجد رسالة حالياً";
            function type() {
                if(i < targetMsg.length) {
                    document.getElementById('msg').innerHTML += targetMsg.charAt(i);
                    i++; setTimeout(type, 80);
                }
            }
            type();
            
            // تأثير انفجار القلوب
            for(let j=0; j<40; j++) {
                setTimeout(() => {
                    let h = document.createElement('div');
                    h.innerHTML = "❤️"; h.className = "heart-particle";
                    h.style.left = Math.random()*100+"vw";
                    h.style.top = "100vh";
                    h.style.fontSize = (Math.random()*20 + 15) + "px";
                    document.body.appendChild(h);
                    setTimeout(() => h.remove(), 3500);
                }, j * 50);
            }
        }
    </script>
</body>
</html>
