<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>تطبيق تغيير الحقوق - الحسني</title>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #f0f0f5);
            --text-color: var(--tg-theme-text-color, #000000);
            --hint-color: var(--tg-theme-hint-color, #8e8e93);
            --button-color: var(--tg-theme-button-color, #007aff);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #ffffff);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            user-select: none;
            overflow-x: hidden;
        }

        /* Header iOS Style */
        header {
            padding: 20px;
            text-align: center;
            background: var(--secondary-bg);
            border-bottom: 1px solid rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        header h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
        }

        header p {
            margin: 5px 0 0;
            color: var(--hint-color);
            font-size: 14px;
        }

        /* Container */
        .container {
            padding: 15px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin: 20px 5px 10px;
        }

        /* Grid for Options */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* Card iOS Style */
        .card {
            background: var(--secondary-bg);
            border-radius: 18px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s active;
            cursor: pointer;
        }

        .card:active {
            transform: scale(0.96);
        }

        .card img {
            width: 50px;
            height: 50px;
            margin-bottom: 10px;
        }

        .card h3 {
            margin: 5px 0;
            font-size: 15px;
            font-weight: 600;
        }

        .card span {
            display: block;
            color: var(--hint-color);
            font-size: 13px;
        }

        /* Execute Button */
        .btn-container {
            margin-top: 30px;
            text-align: center;
        }

        .btn {
            background-color: var(--button-color);
            color: var(--button-text);
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
        }

        /* Footer */
        footer {
            padding: 30px 20px;
            text-align: center;
            font-size: 12px;
            color: var(--hint-color);
        }

        .user-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            color: var(--hint-color);
            font-size: 14px;
        }
    </style>
</head>
<body>

<header>
    <h1>تعديل الحقوق المصغر 💎</h1>
    <p>نظام الحسني - لتغيير الحقوق بسهولة</p>
</header>

<div class="container">
    <div id="user-chip" class="user-info"></div>

    <div class="section-title">اختر نوع التعديل ⚙️</div>
    <div class="grid">
        <div class="card" onclick="selectEdit('تغيير التوقيع')">
            <img src="https://cdn-icons-png.flaticon.com/512/10336/10336582.png" alt="Edit Signature">
            <h3>تغيير التوقيع</h3>
            <span>تحديث توقيع الملف</span>
        </div>
        <div class="card" onclick="selectEdit('تعديل التذييل')">
            <img src="https://cdn-icons-png.flaticon.com/512/1162/1162908.png" alt="Edit Footer">
            <h3>تعديل التذييل</h3>
            <span>حط تذييلك الخاص</span>
        </div>
        <div class="card" onclick="selectEdit('إزالة حقوق الملكية')">
            <img src="https://cdn-icons-png.flaticon.com/512/636/636882.png" alt="Remove Rights">
            <h3>إزالة الحقوق</h3>
            <span>مسح جميع الحقوق القديمة</span>
        </div>
        <div class="card" onclick="selectEdit('تغيير التذييل للجميع')">
            <img src="https://cdn-icons-png.flaticon.com/512/9037/9037302.png" alt="Change Footer for All">
            <h3>تغيير للجميع</h3>
            <span>تحديث تذييل المستخدمين</span>
        </div>
    </div>

    <div class="btn-container">
        <button id="execute-btn" class="btn" onclick="executeEdit()">تنفيذ التعديل</button>
    </div>
</div>

<footer>
    تم التطوير بواسطة Hassany | 2024<br>
    جميع الحقوق محفوظة @hassanyIPA
</footer>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const userChip = document.getElementById('user-chip');
    if (tg.initDataUnsafe.user) {
        userChip.innerHTML = `
            <span>أهلاً بك، <b>${tg.initDataUnsafe.user.first_name}</b></span>
        `;
    }

    let selectedOption = null;

    function selectEdit(option) {
        selectedOption = option;
        document.getElementById('execute-btn').innerText = `تنفيذ ${selectedOption}`;
        tg.HapticFeedback.impactOccurred('medium');
    }

    function executeEdit() {
        if (!selectedOption) {
            tg.showPopup({message: '❌ يرجى اختيار نوع التعديل أولاً.'});
            return;
        }

        tg.showConfirm(`هل أنت متأكد من تنفيذ تعديل: ${selectedOption}؟`, (confirmed) => {
            if (confirmed) {
                // إرسال البيانات للبوت
                tg.sendData(JSON.stringify({
                    edit_type: selectedOption,
                    user: tg.initDataUnsafe.user.username || "بدون يوزر"
                }));
                tg.close();
            }
        });
    }

    tg.onEvent('themeChanged', function() {
        document.documentElement.style.setProperty('--bg-color', tg.themeParams.bg_color);
        document.documentElement.style.setProperty('--text-color', tg.themeParams.text_color);
    });
</script>

</body>
</html>
