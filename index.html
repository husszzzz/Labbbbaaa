<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>من أنت؟ - تحديد المصير</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --barca-blue: #004d98;
            --barca-red: #a50044;
            --gold: #edbb00;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--white);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* الطبقة الخلفية للتأثيرات */
        #effect-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* الواجهة الرئيسية */
        .main-container {
            text-align: center;
            z-index: 10;
            transition: all 0.5s ease;
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 30px;
            text-shadow: 0 5px 15px rgba(255,255,255,0.1);
        }

        .btn-determine {
            background: linear-gradient(45deg, #222, #444);
            color: white;
            border: 2px solid #555;
            padding: 15px 50px;
            font-size: 1.5rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn-determine:hover {
            transform: scale(1.1);
            border-color: var(--white);
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        /* نافذة الاختيار */
        .selection-box {
            display: none;
            gap: 20px;
            margin-top: 20px;
            animation: fadeIn 0.5s ease;
        }

        .choice-card {
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            width: 150px;
        }

        .choice-card:hover { transform: translateY(-10px); }
        .barca:hover { border-color: var(--barca-red); background: rgba(165, 0, 68, 0.2); }
        .real:hover { border-color: #eee; background: rgba(255, 255, 255, 0.1); }

        /* رسائل النتيجة */
        #result-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            font-weight: 900;
            text-align: center;
            width: 100%;
            display: none;
            z-index: 20;
            padding: 20px;
        }

        /* حقوق التصميم */
        footer {
            position: fixed;
            bottom: 20px;
            font-size: 0.9rem;
            color: #555;
            z-index: 10;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* تأثيرات الضحك والارقام 6 */
        .number-6 {
            position: absolute;
            font-size: 2rem;
            font-weight: 900;
            color: #ff0000;
            user-select: none;
            z-index: 5;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .emoji {
            position: absolute;
            font-size: 2.5rem;
            z-index: 5;
            animation: scatter 2s ease-out forwards;
        }

        @keyframes scatter {
            0% { transform: translate(0,0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="effect-canvas"></canvas>

    <div class="main-container" id="main-ui">
        <h1>من أنت؟</h1>
        <button class="btn-determine" id="start-btn" onclick="showChoices()">حـدد</button>
        
        <div class="selection-box" id="choices">
            <div class="choice-card barca" onclick="selectWinner('barca')">
                <p>برشلونة</p>
            </div>
            <div class="choice-card real" onclick="selectWinner('real')">
                <p>ريال مدريد</p>
            </div>
        </div>
    </div>

    <div id="result-message"></div>

    <footer>حقوق التصميم واجبات رابع إعدادي - حسين الحسني</footer>

    <script>
        const canvas = document.getElementById('effect-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function showChoices() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('choices').style.display = 'flex';
        }

        function selectWinner(team) {
            const mainUI = document.getElementById('main-ui');
            const resultMsg = document.getElementById('result-message');
            mainUI.style.opacity = '0';
            
            setTimeout(() => {
                mainUI.style.display = 'none';
                resultMsg.style.display = 'block';
                
                if (team === 'barca') {
                    triggerBarca();
                } else {
                    triggerReal();
                }
            }, 500);
        }

        // تأثيرات برشلونة (فخامة وقوة)
        function triggerBarca() {
            const msg = document.getElementById('result-message');
            msg.innerHTML = `<span style="color:var(--gold)">ارفع رأسك</span><br><span style="font-size:1.5rem">انته من الكتلونيه 💙❤️</span>`;
            msg.style.textShadow = "0 0 20px #a50044";
            
            // إضافة جزيئات ذهبية وبالوان البرشا
            for(let i=0; i<150; i++) {
                setTimeout(createFirework, i * 20);
            }
        }

        function createFirework() {
            const x = Math.random() * canvas.width;
            const y = Math.random() * canvas.height;
            const colors = ['#004d98', '#a50044', '#edbb00'];
            const color = colors[Math.floor(Math.random()*colors.length)];
            
            for(let i=0; i<10; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    size: Math.random() * 4 + 2,
                    color: color,
                    life: 100
                });
            }
        }

        // تأثيرات ريال مدريد (استهزاء ورقم 6)
        function triggerReal() {
            const msg = document.getElementById('result-message');
            msg.innerHTML = `<span style="color:#ff2a2a">ههههههههههه</span><br><span style="font-size:1.2rem">6-2 | 5-0 | 4-0 | 6-3</span>`;
            
            // تساقط الرقم 6
            setInterval(() => {
                const n6 = document.createElement('div');
                n6.className = 'number-6';
                n6.innerText = '6';
                n6.style.left = Math.random() * 100 + 'vw';
                n6.style.animationDuration = (Math.random() * 2 + 1) + 's';
                document.body.appendChild(n6);
                setTimeout(() => n6.remove(), 3000);
            }, 50);

            // تطاير ايموجيات ضحك
            for(let i=0; i<50; i++) {
                const emo = document.createElement('div');
                emo.className = 'emoji';
                emo.innerText = '😂';
                emo.style.left = '50vw';
                emo.style.top = '50vh';
                emo.style.setProperty('--tx', (Math.random() - 0.5) * 200 + 'vw');
                emo.style.setProperty('--ty', (Math.random() - 0.5) * 200 + 'vh');
                document.body.appendChild(emo);
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
                if(p.life <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
