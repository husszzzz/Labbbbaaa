<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Hassany Store - النخبة</title>
    <style>
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans transition-colors duration-500" id="body">

    <header class="p-6 text-center">
        <h1 class="text-4xl font-bold mb-2">Hassany Store</h1>
        <button onclick="changeTheme()" class="bg-blue-600 px-4 py-2 rounded-full">تغيير الألوان</button>
    </header>

    <section class="max-w-4xl mx-auto p-4 grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="glass p-6 rounded-2xl transform transition hover:scale-105">
            <img src="app-icon.png" class="w-16 h-16 mb-4 rounded-xl" alt="App">
            <h2 class="text-xl font-bold">اسم التطبيق</h2>
            <p class="text-gray-300 mt-2">وصف احترافي للتطبيق يوضح ميزاته القوية.</p>
            <button onclick="playSound()" class="mt-4 w-full bg-green-500 py-2 rounded-lg font-bold">تثبيت الآن</button>
        </div>
    </section>

    <section class="max-w-4xl mx-auto mt-10 p-6 glass rounded-2xl">
        <h3 class="text-2xl mb-4">جدول دوري الفرق</h3>
        <table class="w-full text-center">
            <thead><tr class="border-b border-gray-700"><th>الفريق</th><th>الحالة</th></tr></thead>
            <tbody>
                <tr><td>المجلس الأعلى</td><td>متصدر</td></tr>
                <tr><td>المتفوقين</td><td>منافس</td></tr>
                <tr><td>المحارب</td><td>قوي</td></tr>
                <tr><td>العودة</td><td>صاعد</td></tr>
            </tbody>
        </table>
    </section>

    <audio id="installSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

    <script>
        function playSound() { document.getElementById('installSound').play(); }
        function changeTheme() {
            document.getElementById('body').classList.toggle('bg-slate-900');
            document.getElementById('body').classList.toggle('bg-indigo-900');
        }
    </script>
</body>
</html>
